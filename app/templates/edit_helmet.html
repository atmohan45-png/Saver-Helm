{% extends "base.html" %}

{% block header %}Edit Helmet: {{ helmet.helmet_name }}{% endblock %}
{% block subheader %}Manage worker assignment and helmet identity{% endblock %}

{% block content %}
<div class="max-w-2xl bg-white p-8 rounded-3xl shadow-sm border border-gray-100">
    <form method="POST">
        <div class="space-y-6">
            <div class="flex items-center gap-6 mb-8">
                <div
                    class="w-20 h-20 rounded-2xl bg-slate-50 flex items-center justify-center text-slate-400 text-3xl border border-gray-100">
                    <i class="fas fa-hard-hat"></i>
                </div>
                <div>
                    <h4 class="font-bold text-gray-800 text-lg">{{ helmet.helmet_name }}</h4>
                    <p class="text-xs text-gray-400">Hardware ID: {{ helmet.helmet_id }}</p>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Display Name</label>
                    <input type="text" name="helmet_name" value="{{ helmet.helmet_name }}"
                        class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all"
                        required>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Worker Name</label>
                    <input type="text" name="worker_name" value="{{ helmet.worker_name }}"
                        class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all"
                        required>
                </div>
                <div class="md:col-span-2">
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Deployment Zone</label>
                    <input type="text" name="location" value="{{ helmet.location or '' }}"
                        class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Blood Group</label>
                    <input type="text" name="blood_group" value="{{ helmet.blood_group or '' }}"
                        class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Emergency Contact</label>
                    <input type="tel" name="emergency_contact" value="{{ helmet.emergency_contact or '' }}"
                        class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                </div>
            </div>

            <div class="flex gap-4 pt-4">
                <a href="{{ url_for('main.dashboard') }}"
                    class="flex-1 text-center py-4 rounded-xl font-bold text-gray-500 bg-gray-100 hover:bg-gray-200 transition-all">
                    Cancel
                </a>
                <button type="submit"
                    class="flex-[2] bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-lg shadow-blue-100 transition-all transform active:scale-95">
                    Update Helmet Settings
                </button>
            </div>
        </div>
    </form>
</div>
{% endblock %}
