{% extends "base.html" %}

{% block auth_content %}
<div class="min-h-screen bg-slate-50 flex items-center justify-center p-6">
    <div class="max-w-md w-full bg-white rounded-2xl shadow-xl overflow-hidden p-8">
        <div class="text-center mb-10">
            <h1 class="text-4xl font-extrabold text-blue-600 mb-2">SafeLink</h1>
            <p class="text-gray-500">Create your administrator account</p>
        </div>

        <form method="POST">
            <div class="mb-4">
                <label class="block text-sm font-semibold text-gray-700 mb-2" for="email">Email Address</label>
                <input
                    class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all text-gray-800"
                    type="email" name="email" placeholder="email@company.com" required>
            </div>

            <div class="mb-4">
                <label class="block text-sm font-semibold text-gray-700 mb-2" for="username">Username</label>
                <input
                    class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all text-gray-800"
                    type="text" name="username" placeholder="Kirubesh" required>
            </div>

            <div class="mb-8">
                <label class="block text-sm font-semibold text-gray-700 mb-2" for="password">Password</label>
                <input
                    class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all text-gray-800"
                    type="password" name="password" placeholder="••••••••" required>
            </div>

            <button
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-lg shadow-blue-200 transition-all duration-300 transform active:scale-95"
                type="submit">
                Register Account
            </button>
        </form>

        <div class="mt-8 text-center text-sm text-gray-500">
            Already have an account? <a href="{{ url_for('auth.login') }}"
                class="text-blue-600 font-bold hover:underline">Log In</a>
        </div>
    </div>
</div>
{% endblock %}
