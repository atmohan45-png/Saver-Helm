{% extends "base.html" %}

{% block header %}Profile Settings{% endblock %}
{% block subheader %}Manage your account details{% endblock %}

{% block content %}
<div class="max-w-2xl bg-white p-8 rounded-3xl shadow-sm border border-gray-100">
    <form method="POST" enctype="multipart/form-data">
        <div class="space-y-6">
            <div class="flex items-center gap-6 mb-8">
                <div class="relative w-24 h-24">
                    <img src="{{ url_for('static', filename='uploads/' + user.profile_pic) if user.profile_pic != 'default_profile.png' else 'https://ui-avatars.com/api/?name=' + user.username + '&background=random' }}"
                        class="w-full h-full rounded-2xl object-cover border-4 border-white shadow-lg"
                        id="avatar-preview">
                    <label
                        class="absolute -bottom-2 -right-2 bg-blue-600 text-white p-2 rounded-lg cursor-pointer hover:bg-blue-700 shadow-lg">
                        <i class="fas fa-camera text-xs"></i>
                        <input type="file" name="profile_pic" class="hidden" onchange="previewImage(this)">
                    </label>
                </div>
                <div>
                    <h4 class="font-bold text-gray-800 text-lg">{{ user.username }}</h4>
                    <p class="text-xs text-gray-400">Worker Profile</p>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Username</label>
                    <input type="text" name="username" value="{{ user.username }}"
                        class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all"
                        required>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Email Address</label>
                    <input type="email" name="email" value="{{ user.email }}"
                        class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all"
                        required>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Date of Birth</label>
                    <input type="date" name="dob" value="{{ user.dob or '' }}"
                        class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Gender</label>
                    <select name="gender"
                        class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                        <option value="Male" {% if user.gender=='Male' %}selected{% endif %}>Male</option>
                        <option value="Female" {% if user.gender=='Female' %}selected{% endif %}>Female</option>
                        <option value="Other" {% if user.gender=='Other' %}selected{% endif %}>Other</option>
                    </select>
                </div>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">New Password (leave blank to keep
                    current)</label>
                <input type="password" name="password" placeholder="••••••••"
                    class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all">
            </div>

            <button type="submit"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-lg shadow-blue-100 transition-all transform active:scale-95">
                Save Changes
            </button>
        </div>
    </form>
</div>

<script>
    function previewImage(input) {
        if (input.files && input.files[0]) {
            var reader = new FileReader();
            reader.onload = function (e) {
                document.getElementById('avatar-preview').src = e.target.result;
            }
            reader.readAsDataURL(input.files[0]);
        }
    }
</script>
{% endblock %}
